name: SWECircuit Checks

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  template-check:
    name: Template Check
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run SWECircuit checker
        shell: pwsh
        run: .\scripts\check-template.ps1

      - name: Run checker regression tests
        shell: pwsh
        run: .\scripts\test-check-template.ps1

      - name: Check tracked whitespace
        shell: pwsh
        run: |
          $binaryExtensions = @(".png", ".jpg", ".jpeg", ".gif", ".pdf")
          $failures = @()
          foreach ($file in git ls-files) {
            $extension = [System.IO.Path]::GetExtension($file).ToLowerInvariant()
            if ($binaryExtensions -contains $extension) { continue }
            if (-not (Test-Path -LiteralPath $file -PathType Leaf)) { continue }
            $lineNumber = 0
            foreach ($line in Get-Content -LiteralPath $file) {
              $lineNumber += 1
              if ($line -match "[ \t]+$") {
                $failures += "${file}:${lineNumber}: trailing whitespace"
              }
            }
          }
          if ($failures.Count -gt 0) {
            $failures | ForEach-Object { Write-Error $_ }
            exit 1
          }
  kernel-toolchain:
    name: Kernel (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - 22
          - 24
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install pinned dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify kernel
        run: npm run verify
