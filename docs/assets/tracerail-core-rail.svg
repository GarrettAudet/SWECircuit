<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">TraceRail core rail</title>
  <desc id="desc">A linked visual showing TraceRail as goal, spec, rail, gate, evidence, and memory components for traceable AI software work.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#67e8f9" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#050816"/>
    </linearGradient>
    <style>
      .title { font: 800 34px Segoe UI, Inter, Arial, sans-serif; fill: #e5e7eb; letter-spacing: 0; }
      .subtitle { font: 500 20px Segoe UI, Inter, Arial, sans-serif; fill: #8b949e; letter-spacing: 0; }
      .label { font: 800 22px Segoe UI, Inter, Arial, sans-serif; fill: #aeb7c2; letter-spacing: 0; }
      .caption { font: 600 19px Segoe UI, Inter, Arial, sans-serif; fill: #7f8b99; letter-spacing: 0; }
      .symbol { fill: none; stroke: #64748b; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.72; }
      .link { fill: none; stroke-width: 28; filter: url(#softShadow); }
      .inner { fill: none; stroke: #0b1020; stroke-width: 11; opacity: 0.98; }
    </style>
  </defs>

  <rect width="1400" height="520" rx="28" fill="url(#bg)"/>
  <g opacity="0.25">
    <path d="M0 112H1400 M0 224H1400 M0 336H1400 M0 448H1400" stroke="#172033" stroke-width="1"/>
    <path d="M120 0V520 M280 0V520 M440 0V520 M600 0V520 M760 0V520 M920 0V520 M1080 0V520 M1240 0V520" stroke="#172033" stroke-width="1"/>
  </g>

  <text x="700" y="70" text-anchor="middle" class="title">TraceRail Core Components</text>
  <text x="700" y="102" text-anchor="middle" class="subtitle">traceable rails for AI software work</text>

